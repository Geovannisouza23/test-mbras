name: CI Pipeline

on:
  push:
    branches: [ main, uat ]
  pull_request:
    branches: [ main, uat ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Lint vet
        run: go vet ./...

      - name: Lint golint
        run: |
          go install golang.org/x/lint/golint@latest
          golint ./...


      - name: Build
        run: go build ./...

      - name: Static analysis
        run: go vet ./...


      - name: Run unit tests
        run: go test ./... -v


      - name: Check test coverage
        run: |
          go tool cover -func=coverage.out | grep total | awk '{print $3}'

      - name: Run performance test
        run: go test ./internal/test -run TestPerformance_AnalyzeFeed -v


      - name: Check for forbidden files
        run: |
          test ! -f internal/test/test_normalizacao.go

      - name: Check Go formatting
        run: |
          gofmt -l . | (! grep .)

      - name: Check README
        run: |
          test -f README

      - name: Check OpenAPI/Swagger docs
        run: |
          test -f docs/swagger.yaml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Build Docker image
        run: docker build -f deployments/Dockerfile -t backend-challenge-dev .
